<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Administrare Torneo Volley Betel Reus</title>
    <meta name="description" content="Panou privat pentru gestionarea înscrierilor la torneo volley Betel Reus." />
    <link rel="icon" href="/assets/icon-dark.png" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Biserica Betel Reus">
        <img src="/assets/logo-dark.png" alt="Biserica Betel Reus" />
      </a>
      <nav class="nav" aria-label="Navigare administrare">
        <a href="/" data-i18n="navHome">Acasă</a>
        <a href="/admin.html" data-i18n="navAdmin">Panou</a>
        <a href="/volley.html">Volley</a>
      </nav>
      <button class="lang-toggle" type="button" id="langToggle">ES</button>
    </header>

    <main>
      <section class="section admin-page">
        <div class="library-gate" id="adminGate">
          <p class="eyebrow" data-i18n="adminPrivatePanel">Panou privat</p>
          <h1>Torneo volley</h1>
          <p>Introdu codul privat pentru a gestiona echipele înscrise.</p>
          <form class="access-form" id="adminAccessForm">
            <label>
              <span data-i18n="adminCodeLabel">Cod administrare</span>
              <input name="code" type="password" autocomplete="off" required placeholder="Cod privat" data-i18n-placeholder="adminCodePlaceholder" />
            </label>
            <button class="button primary" type="submit" data-i18n="adminEnter">Intră în panou</button>
            <span class="form-note" id="adminAccessMessage"></span>
          </form>
        </div>

        <div class="admin-shell is-hidden" id="adminShell">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Torneo volley</p>
              <h1>Inscrieri echipe</h1>
            </div>
            <div class="header-actions">
              <a class="button secondary" href="/admin.html">Toate secțiunile</a>
              <a class="button secondary" href="/volley.html">Vezi pagina volley</a>
              <button class="button secondary" type="button" id="exitAdmin" data-i18n="exitLibrary">Ieșire</button>
            </div>
          </div>

          <section class="admin-panel volley-admin-panel">
            <div class="section-heading compact-heading">
              <div>
                <p class="eyebrow">Torneo volley</p>
                <h2>Equipos e inscripciones</h2>
              </div>
            </div>
            <div class="table-wrap">
              <table class="admin-table volley-admin-table">
                <thead>
                  <tr>
                    <th>Equipo</th>
                    <th>Representante</th>
                    <th>Jugadores</th>
                    <th>Estado</th>
                    <th>Notas</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="volleyRegistrationsList"></tbody>
              </table>
            </div>
            <span class="form-note" id="volleyAdminMessage"></span>
          </section>
        </div>
      </section>
    </main>

    <footer>
      <img src="/assets/icon-dark.png" alt="" />
      <span>© <span id="year"></span> Biserica Betel Reus</span>
    </footer>

    <script src="/js/app.js" type="module"></script>
  </body>
</html>
