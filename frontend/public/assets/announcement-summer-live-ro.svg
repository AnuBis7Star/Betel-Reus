<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1600" viewBox="0 0 900 1600" role="img" aria-labelledby="title desc">
  <title id="title">Anunț Betel Reus</title>
  <desc id="desc">Pe perioada verii, slujbele de după-amiază nu vor fi transmise live.</desc>
  <rect width="900" height="1600" fill="#f3f0e8"/>
  <rect x="74" y="88" width="752" height="1424" rx="18" fill="#fbfaf7" stroke="#ded7cc" stroke-width="3"/>
  <rect x="118" y="132" width="664" height="1336" rx="10" fill="none" stroke="#171717" stroke-width="2"/>
  <g fill="#171717" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle">
    <text x="450" y="275" font-size="42" letter-spacing="8">ANUNȚ</text>
    <text x="450" y="420" font-size="64" font-weight="700">
      <tspan x="450">Programul live</tspan>
      <tspan x="450" dy="82">pe perioada verii</tspan>
    </text>
    <line x1="270" y1="575" x2="630" y2="575" stroke="#c39b5e" stroke-width="5"/>
    <text x="450" y="720" font-size="52">
      <tspan x="450">Pe perioada verii,</tspan>
      <tspan x="450" dy="72">slujbele de după-amiază</tspan>
      <tspan x="450" dy="72">nu vor fi transmise live.</tspan>
    </text>
    <text x="450" y="1030" font-size="46">
      <tspan x="450">Vă mulțumim</tspan>
      <tspan x="450" dy="64">pentru înțelegere.</tspan>
      <tspan x="450" dy="64">Fiți binecuvântați!</tspan>
    </text>
    <text x="450" y="1310" font-size="48" font-weight="700">Betel Reus</text>
  </g>
  <text x="450" y="1360" fill="#66615a" font-family="Arial, sans-serif" font-size="14" letter-spacing="6" text-anchor="middle">O CASĂ DE ÎNCHINARE</text>
</svg>
